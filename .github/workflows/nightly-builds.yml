name: On-Demand Build

on:
  workflow_dispatch:  # Only runs when manually triggered

jobs:
  build:
    runs-on: windows-2022  # Explicitly using Windows Server 2022 to avoid future migration issues

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Updated to latest version

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4  # Updated to latest version
      with:
        dotnet-version: 8.x

    - name: Build and package
      run: |
        # Get current date for version suffix
        $date = (Get-Date).ToString("yyyyMMdd")
        python .\publish.py --version-suffix="-manual+$date"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4  # Updated to v4
      with:
        name: LGSTrayBattery
        path: ./bin/Release/publish/*.zip
